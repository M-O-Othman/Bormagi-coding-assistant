<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Bormagi — Virtual Meeting</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: var(--vscode-editor-background);
    --fg: var(--vscode-editor-foreground);
    --border: var(--vscode-panel-border, #444);
    --input-bg: var(--vscode-input-background);
    --input-border: var(--vscode-input-border, #555);
    --btn-bg: var(--vscode-button-background);
    --btn-fg: var(--vscode-button-foreground);
    --btn-hover: var(--vscode-button-hoverBackground);
    --secondary-bg: var(--vscode-editorWidget-background, #252526);
    --accent: var(--vscode-focusBorder, #007acc);
    --muted: var(--vscode-descriptionForeground, #888);
    --tag-bg: var(--vscode-badge-background, #4d4d4d);
    --tag-fg: var(--vscode-badge-foreground, #fff);
    --success: #4caf50;
    --warn: #ff9800;
  }
  body { background: var(--bg); color: var(--fg); font-family: var(--vscode-font-family, sans-serif); font-size: 13px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  /* ── Tabs ─────────────────────────────────────────── */
  .tab-bar { display: flex; border-bottom: 1px solid var(--border); background: var(--secondary-bg); flex-shrink: 0; }
  .tab { padding: 8px 16px; cursor: pointer; border-bottom: 2px solid transparent; color: var(--muted); user-select: none; }
  .tab.active { border-bottom-color: var(--accent); color: var(--fg); }
  .tab-content { flex: 1; overflow: hidden; display: none; flex-direction: column; min-height: 0; }
  .tab-content.active { display: flex; }

  /* ── Forms ────────────────────────────────────────── */
  .form-group { margin-bottom: 12px; }
  label { display: block; margin-bottom: 4px; color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
  input[type=text], textarea, select { width: 100%; background: var(--input-bg); color: var(--fg); border: 1px solid var(--input-border); border-radius: 3px; padding: 6px 8px; font-size: 13px; font-family: inherit; resize: vertical; }
  input[type=text]:focus, textarea:focus { outline: 1px solid var(--accent); }
  .checkbox-list { max-height: 120px; overflow-y: auto; border: 1px solid var(--input-border); border-radius: 3px; padding: 4px; background: var(--input-bg); }
  .checkbox-list label { display: flex; align-items: center; gap: 6px; padding: 3px 4px; color: var(--fg); font-size: 12px; text-transform: none; letter-spacing: 0; cursor: pointer; }
  .checkbox-list label:hover { background: var(--secondary-bg); }

  /* ── Buttons ──────────────────────────────────────── */
  .btn { display: inline-flex; align-items: center; gap: 5px; padding: 6px 12px; background: var(--btn-bg); color: var(--btn-fg); border: none; border-radius: 3px; cursor: pointer; font-size: 12px; font-family: inherit; }
  .btn:hover { background: var(--btn-hover); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--fg); }
  .btn-outline:hover { background: var(--secondary-bg); }
  .btn-danger { background: var(--vscode-errorForeground, #f44); color: #fff; }
  .btn-sm { padding: 3px 8px; font-size: 11px; }

  /* ── Setup tab ────────────────────────────────────── */
  #tab-setup { padding: 16px; overflow-y: auto; }
  #tab-setup h2 { margin-bottom: 16px; font-size: 15px; }

  /* ── Meeting tab ──────────────────────────────────── */
  #tab-meeting { display: flex; flex-direction: column; height: 100%; overflow: hidden; }
  .meeting-layout { display: flex; flex: 1; overflow: hidden; min-height: 0; }
  .agenda-sidebar { width: 220px; flex-shrink: 0; border-right: 1px solid var(--border); overflow-y: auto; padding: 8px; }
  .agenda-sidebar h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); margin-bottom: 8px; padding: 0 4px; }
  .agenda-item-btn { display: block; width: 100%; text-align: left; padding: 7px 8px; background: transparent; border: 1px solid transparent; border-radius: 4px; cursor: pointer; color: var(--fg); font-size: 12px; font-family: inherit; margin-bottom: 4px; }
  .agenda-item-btn:hover { background: var(--secondary-bg); }
  .agenda-item-btn.active { border-color: var(--accent); background: var(--secondary-bg); }
  .agenda-item-btn.resolved { opacity: 0.5; }
  .item-status-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
  .dot-pending { background: var(--muted); }
  .dot-discussing { background: var(--warn); }
  .dot-resolved { background: var(--success); }

  /* chat feed */
  .chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
  .chat-feed { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 12px; min-height: 0; }
  .item-header { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; padding-bottom: 8px; border-bottom: 1px solid var(--border); margin-bottom: 8px; }
  .round-divider { font-size: 10px; color: var(--muted); text-align: center; padding: 4px 0; border-top: 1px dashed var(--border); }
  .agent-msg { background: var(--secondary-bg); border-radius: 6px; padding: 10px 12px; }
  .agent-msg-header { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
  .agent-avatar { width: 22px; height: 22px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; color: #fff; flex-shrink: 0; }
  .agent-name { font-weight: 600; font-size: 12px; }
  .agent-timestamp { font-size: 10px; color: var(--muted); margin-left: auto; }
  .agent-body { font-size: 13px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
  .user-msg { align-self: flex-end; max-width: 80%; background: var(--accent); color: #fff; border-radius: 6px; padding: 8px 12px; font-size: 13px; line-height: 1.5; word-break: break-word; }
  .user-msg-label { font-size: 10px; opacity: 0.75; margin-bottom: 3px; }

  /* chat input bar */
  .chat-input-bar { flex-shrink: 0; border-top: 1px solid var(--border); padding: 8px 12px; background: var(--secondary-bg); }
  .chat-input-row { display: flex; gap: 8px; align-items: flex-end; }
  .chat-input-row textarea { flex: 1; min-height: 36px; max-height: 120px; resize: none; border-radius: 4px; padding: 7px 10px; line-height: 1.4; }
  .chat-controls { display: flex; gap: 6px; padding-top: 6px; flex-wrap: wrap; }
  .agenda-select-label { font-size: 11px; color: var(--muted); margin-right: 4px; }
  select.agenda-sel { width: auto; padding: 4px 6px; font-size: 12px; }

  /* resolved notice */
  .resolved-notice { background: rgba(76,175,80,0.12); border: 1px solid var(--success); border-radius: 6px; padding: 10px 14px; margin: 8px 12px; font-size: 12px; }
  .resolved-notice strong { color: var(--success); }

  /* ── Action Items tab ─────────────────────────────── */
  #tab-actions { padding: 12px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
  .action-list { display: flex; flex-direction: column; gap: 6px; }
  .action-card { background: var(--secondary-bg); border-radius: 4px; padding: 8px 12px; display: flex; align-items: center; gap: 10px; }
  .action-assignee { background: var(--tag-bg); color: var(--tag-fg); border-radius: 10px; padding: 1px 8px; font-size: 11px; white-space: nowrap; }
  .action-text { flex: 1; font-size: 13px; }
  .add-action-form { display: flex; gap: 8px; align-items: flex-end; }
  .add-action-form input { flex: 2; }
  .add-action-form select { flex: 1; }

  /* ── Minutes tab ──────────────────────────────────── */
  #tab-minutes { padding: 12px; display: flex; flex-direction: column; gap: 8px; overflow: hidden; }
  #minutes-output { flex: 1; overflow-y: auto; background: var(--secondary-bg); border-radius: 4px; padding: 12px; font-size: 13px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; border: 1px solid var(--border); }
  .minutes-controls { display: flex; gap: 8px; }

  /* ── Empty / placeholder ──────────────────────────── */
  .empty { color: var(--muted); font-size: 12px; padding: 20px; text-align: center; }
  .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid var(--muted); border-top-color: var(--fg); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="tab-bar">
  <div class="tab active" onclick="switchTab('setup')" id="tabt-setup">Setup</div>
  <div class="tab" onclick="switchTab('meeting')" id="tabt-meeting">Meeting</div>
  <div class="tab" onclick="switchTab('actions')" id="tabt-actions">Action Items</div>
  <div class="tab" onclick="switchTab('minutes')" id="tabt-minutes">Minutes</div>
</div>

<!-- ══════════════════════════════════════════════════
     TAB 1 — SETUP
═══════════════════════════════════════════════════ -->
<div class="tab-content active" id="tab-setup">
  <h2>Start a Virtual Meeting</h2>

  <div class="form-group">
    <label>Meeting Title</label>
    <input type="text" id="meeting-title" placeholder="e.g. Q2 Architecture Review"/>
  </div>

  <div class="form-group">
    <label>Agenda Items (one per line)</label>
    <textarea id="agenda-input" rows="5" placeholder="What database engine should we use?&#10;How do we handle authentication?&#10;Deployment strategy?"></textarea>
  </div>

  <div class="form-group">
    <label>Participants (select agents)</label>
    <div class="checkbox-list" id="agent-checkboxes">
      <span class="empty">Loading agents…</span>
    </div>
  </div>

  <div class="form-group">
    <label>Resource Files (optional)</label>
    <div class="checkbox-list" id="file-checkboxes">
      <span class="empty">Loading workspace files…</span>
    </div>
  </div>

  <div class="form-group">
    <label>Pre-Meeting Action Items (optional)</label>
    <div id="pre-action-list" style="display:flex;flex-direction:column;gap:4px;margin-bottom:8px;"></div>
    <div class="add-action-form">
      <input type="text" id="pre-action-text" placeholder="Describe the action item"/>
      <input type="text" id="pre-action-assignee" list="agents-datalist" placeholder="Assigned to (any name)"/>
      <button class="btn btn-sm btn-outline" type="button" onclick="addPreActionItem()">Add</button>
    </div>
  </div>

  <button class="btn" onclick="startMeeting()" id="start-btn">Start Meeting</button>
  <datalist id="agents-datalist"></datalist>
</div>

<!-- ══════════════════════════════════════════════════
     TAB 2 — MEETING
═══════════════════════════════════════════════════ -->
<div class="tab-content" id="tab-meeting">
  <div class="meeting-layout">
    <!-- Agenda sidebar -->
    <div class="agenda-sidebar">
      <h3>Agenda</h3>
      <div id="agenda-list"><span class="empty">No agenda yet.</span></div>
    </div>

    <!-- Chat area -->
    <div class="chat-area">
      <div class="chat-feed" id="chat-feed">
        <span class="empty">Start the meeting to begin the discussion.</span>
      </div>

      <!-- Chat input bar (shown during meeting) -->
      <div class="chat-input-bar" id="chat-input-bar" style="display:none">
        <div style="margin-bottom:6px; display:flex; align-items:center; gap:8px; flex-wrap:wrap;">
          <span class="agenda-select-label">Discussing:</span>
          <select class="agenda-sel" id="active-item-sel"></select>
        </div>
        <div class="chat-input-row">
          <textarea id="user-input" rows="2" placeholder="Type a message or question for the agents, then press Continue Discussion…" onkeydown="handleInputKey(event)"></textarea>
          <button class="btn" onclick="continueDiscussion()" id="continue-btn" title="Run another round">
            <span class="spinner" id="send-spinner" style="display:none"></span>
            Continue Discussion
          </button>
        </div>
        <div class="chat-controls">
          <button class="btn btn-outline btn-sm" onclick="resolveCurrentItem()">✓ Mark Resolved</button>
          <button class="btn btn-outline btn-sm" onclick="switchTab('actions')">+ Action Item</button>
          <button class="btn btn-danger btn-sm" onclick="endMeeting()" id="end-meeting-btn">■ End Meeting</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════════════
     TAB 3 — ACTION ITEMS
═══════════════════════════════════════════════════ -->
<div class="tab-content" id="tab-actions">
  <h3 style="margin-bottom:8px">Action Items</h3>
  <div class="action-list" id="action-list">
    <span class="empty">No action items yet.</span>
  </div>
  <div style="margin-top:16px">
    <label style="display:block;margin-bottom:6px;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)">Add Action Item</label>
    <div class="add-action-form">
      <input type="text" id="new-action-text" placeholder="Action item description"/>
      <input type="text" id="new-action-assignee" list="agents-datalist" placeholder="Assigned to (any name)"/>
      <button class="btn btn-sm" onclick="addActionItem()">Add</button>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════════════
     TAB 4 — MINUTES
═══════════════════════════════════════════════════ -->
<div class="tab-content" id="tab-minutes">
  <div class="minutes-controls">
    <button class="btn" onclick="generateMinutes()">Generate Minutes</button>
    <button class="btn btn-outline" onclick="saveMinutes()">Save to File</button>
  </div>
  <div id="minutes-output" class="empty">Click "Generate Minutes" to create meeting minutes.</div>
</div>

<script>
// ── VS Code API ────────────────────────────────────────────
const vscode = acquireVsCodeApi();

// ── State ──────────────────────────────────────────────────
let allAgents = [];        // { id, name }[]
let allFiles = [];         // string[]
let meeting = null;        // Meeting object from extension
let activeItemId = null;
let roundRunning = false;
let meetingEnded = false;
let preActionItems = [];   // { text, assignedTo }[] — collected before meeting starts

// Per-item chat feeds: itemId → array of rendered html strings (we append to the DOM directly)
const itemBuffers = {};   // itemId → { agentBuffers: { agentId: string }, roundCount: number }

// ── Tab switching ──────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab, .tab-content').forEach(el => el.classList.remove('active'));
  document.getElementById('tabt-' + name).classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
}

// ── Message handling ───────────────────────────────────────
window.addEventListener('message', e => {
  const msg = e.data;
  switch (msg.type) {
    case 'agents_list':       onAgentsList(msg.agents); break;
    case 'workspace_files':   onWorkspaceFiles(msg.files); break;
    case 'meeting_started':   onMeetingStarted(msg.meeting); break;
    case 'round_started':     onRoundStarted(msg.agendaItemId, msg.userMessage); break;
    case 'agent_delta':       onAgentDelta(msg.agendaItemId, msg.agentId, msg.delta); break;
    case 'agent_round_done':  onAgentRoundDone(msg.agendaItemId, msg.agentId, msg.fullResponse); break;
    case 'round_complete':    onRoundComplete(msg.agendaItemId); break;
    case 'round_error':       onRoundError(msg.agendaItemId, msg.error); break;
    case 'item_resolved':     onItemResolved(msg.agendaItemId, msg.decision); break;
    case 'action_item_added': onActionItemAdded(msg.actionItem); break;
    case 'minutes_ready':     onMinutesReady(msg.markdown); break;
    case 'meeting_stopped':   onMeetingStopped(msg.minutes); break;
  }
});

// ── Setup handlers ─────────────────────────────────────────
function onAgentsList(agents) {
  allAgents = agents;
  const box = document.getElementById('agent-checkboxes');
  if (!agents.length) { box.innerHTML = '<span class="empty">No agents configured.</span>'; return; }
  box.innerHTML = agents.map(a =>
    `<label><input type="checkbox" value="${esc(a.id)}"/> ${esc(a.name)}</label>`
  ).join('');

  // Populate agents-datalist for action item assignee autocomplete
  const dl = document.getElementById('agents-datalist');
  if (dl) {
    dl.innerHTML = agents.map(a => `<option value="${esc(a.name)}"/>`).join('');
  }
}

function onWorkspaceFiles(files) {
  allFiles = files;
  const box = document.getElementById('file-checkboxes');
  if (!files.length) { box.innerHTML = '<span class="empty">No files found.</span>'; return; }
  box.innerHTML = files.map(f =>
    `<label><input type="checkbox" value="${esc(f)}"/> ${esc(f)}</label>`
  ).join('');
}

function startMeeting() {
  const title = document.getElementById('meeting-title').value.trim();
  if (!title) { alert('Please enter a meeting title.'); return; }

  const agendaLines = document.getElementById('agenda-input').value.split('\n').map(l => l.trim()).filter(Boolean);
  if (!agendaLines.length) { alert('Please enter at least one agenda item.'); return; }

  const participants = [...document.querySelectorAll('#agent-checkboxes input:checked')].map(cb => cb.value);
  if (!participants.length) { alert('Please select at least one agent participant.'); return; }

  const resourceFiles = [...document.querySelectorAll('#file-checkboxes input:checked')].map(cb => cb.value);

  document.getElementById('start-btn').disabled = true;
  vscode.postMessage({ type: 'start_meeting', title, agendaLines, participants, resourceFiles, initialActionItems: preActionItems });
}

// ── Meeting started ────────────────────────────────────────
function onMeetingStarted(m) {
  meeting = m;
  switchTab('meeting');

  // Render agenda sidebar
  renderAgendaSidebar();

  // Populate active-item selector
  const sel = document.getElementById('active-item-sel');
  sel.innerHTML = meeting.agenda.map(item =>
    `<option value="${esc(item.id)}">${esc(item.text)}</option>`
  ).join('');

  // Show chat input bar
  document.getElementById('chat-input-bar').style.display = '';

  // Render any pre-meeting action items that were included
  if (meeting.actionItems && meeting.actionItems.length > 0) {
    meeting.actionItems.forEach(ai => onActionItemAdded(ai));
  }

  // Clear feed, show first item
  const feed = document.getElementById('chat-feed');
  feed.innerHTML = '';
  if (meeting.agenda.length > 0) {
    setActiveItem(meeting.agenda[0].id);
  }
}

function renderAgendaSidebar() {
  if (!meeting) { return; }
  const list = document.getElementById('agenda-list');
  list.innerHTML = meeting.agenda.map(item => {
    const dotClass = item.status === 'resolved' ? 'dot-resolved' : item.status === 'discussing' ? 'dot-discussing' : 'dot-pending';
    return `<button class="agenda-item-btn${activeItemId === item.id ? ' active' : ''}${item.status === 'resolved' ? ' resolved' : ''}"
      onclick="setActiveItem('${esc(item.id)}')" id="abtn-${esc(item.id)}">
      <span class="item-status-dot ${dotClass}"></span>${esc(item.text)}
    </button>`;
  }).join('');
}

function setActiveItem(itemId) {
  activeItemId = itemId;
  document.getElementById('active-item-sel').value = itemId;

  // Show item's feed content
  const feed = document.getElementById('chat-feed');
  feed.innerHTML = '';

  if (!meeting) { return; }
  const item = meeting.agenda.find(a => a.id === itemId);
  if (!item) { return; }

  // Header
  const header = document.createElement('div');
  header.className = 'item-header';
  header.textContent = item.text;
  feed.appendChild(header);

  // Show resolved notice if applicable
  if (item.status === 'resolved' && item.decision) {
    const notice = document.createElement('div');
    notice.className = 'resolved-notice';
    notice.innerHTML = `<strong>Resolved.</strong> ${esc(item.decision)}`;
    feed.appendChild(notice);
  }

  // Replay existing rounds for this item
  const rounds = (meeting.rounds || []).filter(r => r.agendaItemId === itemId);
  // Group by pass — each full cycle through agents = one pass
  if (rounds.length > 0) {
    const passSize = meeting.participants.length || 1;
    let passIdx = 0;
    for (let i = 0; i < rounds.length; i++) {
      if (i % passSize === 0) {
        passIdx++;
        const div = document.createElement('div');
        div.className = 'round-divider';
        div.textContent = `— Pass ${passIdx} —`;
        feed.appendChild(div);
      }
      const r = rounds[i];
      appendAgentMessage(feed, r.agentId, r.response, r.timestamp);
    }
  }

  renderAgendaSidebar();
  feed.scrollTop = feed.scrollHeight;
}

// ── Round streaming ────────────────────────────────────────
function onRoundStarted(agendaItemId, userMessage) {
  roundRunning = true;
  setRoundUiState(true);

  // If this item isn't currently shown, switch to it
  if (activeItemId !== agendaItemId) {
    setActiveItem(agendaItemId);
  }

  const feed = document.getElementById('chat-feed');

  // Show user's message if any
  if (userMessage) {
    const userDiv = document.createElement('div');
    userDiv.className = 'user-msg';
    userDiv.innerHTML = `<div class="user-msg-label">You</div>${esc(userMessage)}`;
    feed.appendChild(userDiv);
  }

  // Round divider
  const existingRounds = (meeting.rounds || []).filter(r => r.agendaItemId === agendaItemId);
  const passIdx = Math.floor(existingRounds.length / (meeting.participants.length || 1)) + 1;
  const div = document.createElement('div');
  div.className = 'round-divider';
  div.textContent = `— Pass ${passIdx} —`;
  feed.appendChild(div);

  // Initialise streaming buffers
  if (!itemBuffers[agendaItemId]) { itemBuffers[agendaItemId] = {}; }
  meeting.participants.forEach(aid => { itemBuffers[agendaItemId][aid] = null; });

  feed.scrollTop = feed.scrollHeight;
}

function onAgentDelta(agendaItemId, agentId, delta) {
  if (activeItemId !== agendaItemId) { return; }
  const feed = document.getElementById('chat-feed');

  let el = document.getElementById(`stream-${agendaItemId}-${agentId}`);
  if (!el) {
    // Create streaming message card
    const agent = allAgents.find(a => a.id === agentId);
    const name = agent ? agent.name : agentId;
    const wrapper = document.createElement('div');
    wrapper.className = 'agent-msg';
    wrapper.innerHTML = `
      <div class="agent-msg-header">
        <div class="agent-avatar">${name.charAt(0).toUpperCase()}</div>
        <span class="agent-name">${esc(name)}</span>
        <span class="agent-timestamp"><span class="spinner"></span></span>
      </div>
      <div class="agent-body" id="stream-${agendaItemId}-${agentId}"></div>`;
    feed.appendChild(wrapper);
    el = document.getElementById(`stream-${agendaItemId}-${agentId}`);
  }
  const wasNearBottom = isNearBottom(feed);
  el.textContent += delta;
  if (wasNearBottom) { scrollToBottom(feed); }
}

function onAgentRoundDone(agendaItemId, agentId, fullResponse) {
  // Remove spinner from the agent's card header
  const el = document.getElementById(`stream-${agendaItemId}-${agentId}`);
  if (el) {
    const card = el.closest('.agent-msg');
    const spinner = card && card.querySelector('.spinner');
    if (spinner) { spinner.parentElement.textContent = new Date().toLocaleTimeString(); }
    el.removeAttribute('id'); // prevent reuse
  }

  // Update local meeting rounds cache
  if (meeting) {
    meeting.rounds = meeting.rounds || [];
    meeting.rounds.push({ agendaItemId, agentId, response: fullResponse, timestamp: new Date().toISOString() });
  }
}

function onRoundComplete(agendaItemId) {
  roundRunning = false;
  setRoundUiState(false);

  // Update agenda item status to 'discussing' (still active)
  if (meeting) {
    const item = meeting.agenda.find(a => a.id === agendaItemId);
    if (item && item.status !== 'resolved') { item.status = 'discussing'; }
  }
  renderAgendaSidebar();
}

function onRoundError(agendaItemId, error) {
  roundRunning = false;
  setRoundUiState(false);
  const feed = document.getElementById('chat-feed');
  const errDiv = document.createElement('div');
  errDiv.style.cssText = 'color:var(--vscode-errorForeground,#f44);font-size:12px;padding:8px 0;';
  errDiv.textContent = `Error: ${error}`;
  feed.appendChild(errDiv);
}

function onItemResolved(agendaItemId, decision) {
  if (!meeting) { return; }
  const item = meeting.agenda.find(a => a.id === agendaItemId);
  if (item) { item.status = 'resolved'; item.decision = decision; }

  if (activeItemId === agendaItemId) {
    const feed = document.getElementById('chat-feed');
    const notice = document.createElement('div');
    notice.className = 'resolved-notice';
    notice.innerHTML = `<strong>Resolved.</strong> ${decision ? esc(decision) : '(No decision recorded)'}`;
    feed.appendChild(notice);
    feed.scrollTop = feed.scrollHeight;
  }
  renderAgendaSidebar();
}

// ── User actions ───────────────────────────────────────────
function continueDiscussion() {
  if (roundRunning) { return; }
  const itemId = document.getElementById('active-item-sel').value;
  if (!itemId) { return; }
  const userMessage = document.getElementById('user-input').value.trim() || undefined;
  document.getElementById('user-input').value = '';
  vscode.postMessage({ type: 'run_round', agendaItemId: itemId, userMessage });
}

function handleInputKey(e) {
  // Ctrl+Enter or Shift+Enter to send (Enter alone = newline for multi-line)
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    e.preventDefault();
    continueDiscussion();
  }
}

function resolveCurrentItem() {
  if (!activeItemId || roundRunning) { return; }
  const userInput = document.getElementById('user-input').value.trim();
  const decision = userInput || prompt('Enter your decision or summary (optional):') || '';
  document.getElementById('user-input').value = '';
  vscode.postMessage({ type: 'resolve_item', agendaItemId: activeItemId, decision });
}

function setRoundUiState(busy) {
  document.getElementById('continue-btn').disabled = busy;
  document.getElementById('send-spinner').style.display = busy ? '' : 'none';
}

// ── Active item selector ───────────────────────────────────
document.getElementById('active-item-sel').addEventListener('change', function() {
  setActiveItem(this.value);
});

// ── Action Items ───────────────────────────────────────────
function onActionItemAdded(ai) {
  const list = document.getElementById('action-list');
  const empty = list.querySelector('.empty');
  if (empty) { empty.remove(); }

  const card = document.createElement('div');
  card.className = 'action-card';
  card.innerHTML = `<span class="action-text">${esc(ai.text)}</span>
    <span class="action-assignee">${esc(ai.assignedTo || 'Unassigned')}</span>`;
  list.appendChild(card);
}

function addActionItem() {
  const text = document.getElementById('new-action-text').value.trim();
  const assignedTo = document.getElementById('new-action-assignee').value.trim() || 'Unassigned';
  if (!text) { return; }
  document.getElementById('new-action-text').value = '';
  document.getElementById('new-action-assignee').value = '';
  vscode.postMessage({ type: 'add_action_item', text, assignedTo });
}

// ── Minutes ────────────────────────────────────────────────
function generateMinutes() {
  vscode.postMessage({ type: 'generate_minutes' });
}

function onMinutesReady(markdown) {
  document.getElementById('minutes-output').textContent = markdown;
}

function saveMinutes() {
  const markdown = document.getElementById('minutes-output').textContent;
  if (!markdown || markdown.includes('Click "Generate Minutes"')) { alert('Generate minutes first.'); return; }
  vscode.postMessage({ type: 'save_minutes', markdown });
}

// ── Scroll helpers ─────────────────────────────────────────
// Returns true when the user is already near the bottom — so auto-scroll is safe.
// If the user has scrolled up to read, we leave them in place.
function isNearBottom(el, threshold = 80) {
  return el.scrollHeight - el.scrollTop - el.clientHeight <= threshold;
}
function scrollToBottom(el) {
  el.scrollTop = el.scrollHeight;
}

// ── Helpers ────────────────────────────────────────────────
function appendAgentMessage(feed, agentId, text, timestamp) {
  const agent = allAgents.find(a => a.id === agentId);
  const name = agent ? agent.name : agentId;
  const div = document.createElement('div');
  div.className = 'agent-msg';
  div.innerHTML = `
    <div class="agent-msg-header">
      <div class="agent-avatar">${name.charAt(0).toUpperCase()}</div>
      <span class="agent-name">${esc(name)}</span>
      <span class="agent-timestamp">${timestamp ? new Date(timestamp).toLocaleTimeString() : ''}</span>
    </div>
    <div class="agent-body">${esc(text)}</div>`;
  feed.appendChild(div);
}

function esc(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ── End Meeting ────────────────────────────────────────────
function endMeeting() {
  if (!meeting || meetingEnded) { return; }
  if (!confirm('End the meeting now? Minutes will be saved automatically.')) { return; }
  const endBtn = document.getElementById('end-meeting-btn');
  if (endBtn) { endBtn.disabled = true; endBtn.textContent = 'Ending…'; }
  vscode.postMessage({ type: 'stop_meeting' });
}

function onMeetingStopped(minutes) {
  meetingEnded = true;
  roundRunning = false;
  setRoundUiState(false);

  const endBtn = document.getElementById('end-meeting-btn');
  if (endBtn) { endBtn.disabled = true; endBtn.textContent = '✓ Ended'; }
  const continueBtn = document.getElementById('continue-btn');
  if (continueBtn) { continueBtn.disabled = true; }

  const feed = document.getElementById('chat-feed');
  const banner = document.createElement('div');
  banner.className = 'resolved-notice';
  banner.innerHTML = '<strong>Meeting ended.</strong> Minutes have been saved automatically.';
  feed.appendChild(banner);
  feed.scrollTop = feed.scrollHeight;

  if (minutes) {
    document.getElementById('minutes-output').textContent = minutes;
    switchTab('minutes');
  }
}

// ── Pre-Meeting Action Items ───────────────────────────────
function addPreActionItem() {
  const text = document.getElementById('pre-action-text').value.trim();
  const assignedTo = document.getElementById('pre-action-assignee').value.trim() || 'Unassigned';
  if (!text) { return; }
  preActionItems.push({ text, assignedTo });
  document.getElementById('pre-action-text').value = '';
  document.getElementById('pre-action-assignee').value = '';
  renderPreActionItems();
}

function removePreActionItem(i) {
  preActionItems.splice(i, 1);
  renderPreActionItems();
}

function renderPreActionItems() {
  const list = document.getElementById('pre-action-list');
  if (!list) { return; }
  if (preActionItems.length === 0) { list.innerHTML = ''; return; }
  list.innerHTML = preActionItems.map((ai, i) =>
    `<div class="action-card" style="font-size:12px;">
      <span class="action-text">${esc(ai.text)}</span>
      <span class="action-assignee">${esc(ai.assignedTo)}</span>
      <button class="btn btn-sm btn-outline" style="padding:1px 6px;margin-left:4px;" onclick="removePreActionItem(${i})">×</button>
    </div>`
  ).join('');
}
</script>
</body>
</html>
