<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline';" />
  <title>Bormagi</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --radius-sm: 4px;
      --radius-md: 8px;
      --transition: 140ms ease;
    }

    body {
      font-family: var(--vscode-font-family);
      font-size: 13px;
      color: var(--vscode-foreground);
      background: var(--vscode-sideBar-background, var(--vscode-editor-background));
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      line-height: 1.5;
    }

    /* ── TOOLBAR ──────────────────────────────────────────────────────────── */

    #toolbar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 10px;
      border-bottom: 1px solid var(--vscode-widget-border, rgba(128,128,128,0.2));
      background: var(--vscode-sideBarSectionHeader-background, var(--vscode-editor-background));
      flex-shrink: 0;
    }

    #brand {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.4px;
      text-transform: uppercase;
      opacity: 0.4;
      white-space: nowrap;
      flex-shrink: 0;
    }

    #agent-selector-wrap {
      flex: 1;
      min-width: 0;
      position: relative;
    }

    #agent-selector {
      width: 100%;
      background: var(--vscode-dropdown-background, var(--vscode-input-background));
      color: var(--vscode-dropdown-foreground, var(--vscode-foreground));
      border: 1px solid var(--vscode-dropdown-border, rgba(128,128,128,0.35));
      border-radius: var(--radius-sm);
      padding: 4px 22px 4px 8px;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: border-color var(--transition);
    }
    #agent-selector:focus {
      outline: 1px solid var(--vscode-focusBorder);
      border-color: var(--vscode-focusBorder);
    }
    #agent-selector-wrap::after {
      content: '';
      position: absolute;
      right: 7px; top: 50%;
      transform: translateY(-50%);
      border: 4px solid transparent;
      border-top-color: currentColor;
      opacity: 0.45;
      pointer-events: none;
    }

    #provider-pill {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 10px;
      background: var(--vscode-badge-background);
      color: var(--vscode-badge-foreground);
      white-space: nowrap;
      flex-shrink: 0;
      opacity: 0;
      transition: opacity var(--transition);
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    #provider-pill.visible { opacity: 1; }

    .tb-btn {
      background: none;
      border: none;
      color: var(--vscode-foreground);
      cursor: pointer;
      padding: 3px;
      border-radius: var(--radius-sm);
      opacity: 0.4;
      transition: opacity var(--transition), background var(--transition);
      flex-shrink: 0;
      display: flex; align-items: center;
    }
    .tb-btn:hover { opacity: 0.9; background: var(--vscode-toolbar-hoverBackground); }
    .tb-btn svg { display: block; }

    /* ── MESSAGES ─────────────────────────────────────────────────────────── */

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 14px 10px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    #empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 7px;
      opacity: 0.3;
      padding: 32px 20px;
      text-align: center;
    }
    .empty-icon { font-size: 28px; }
    .empty-title { font-size: 13px; font-weight: 600; }
    .empty-sub { font-size: 11px; }

    .msg {
      display: flex;
      flex-direction: column;
      gap: 3px;
      animation: fadeUp 170ms ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: none; }
    }

    .msg-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 3px;
    }

    .msg-avatar {
      width: 17px; height: 17px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 9px; font-weight: 700;
      flex-shrink: 0;
    }
    .msg.user      .msg-avatar { background: var(--vscode-button-background); color: var(--vscode-button-foreground); }
    .msg.assistant .msg-avatar { background: var(--vscode-badge-background);  color: var(--vscode-badge-foreground); }
    .msg.system    .msg-avatar { background: var(--vscode-descriptionForeground); color: var(--vscode-editor-background); }
    .msg.error     .msg-avatar { background: var(--vscode-inputValidation-errorBorder); color: #fff; }

    .msg-sender { font-size: 11px; font-weight: 600; opacity: 0.6; }
    .msg-time   { font-size: 10px; opacity: 0.3; margin-left: auto; }

    .msg-bubble {
      border-radius: var(--radius-md);
      overflow: hidden;
      border: 1px solid transparent;
    }

    .msg.user .msg-bubble {
      background: var(--vscode-input-background);
      border-color: var(--vscode-input-border, rgba(128,128,128,0.25));
      margin-left: 23px;
    }
    .msg.assistant .msg-bubble {
      background: var(--vscode-editorWidget-background, rgba(128,128,128,0.06));
      border-color: var(--vscode-widget-border, rgba(128,128,128,0.14));
    }
    .msg.system .msg-bubble {
      background: var(--vscode-editorWidget-background, rgba(128,128,128,0.06));
      border-color: var(--vscode-widget-border, rgba(128,128,128,0.14));
    }
    .msg.error .msg-bubble {
      background: var(--vscode-inputValidation-errorBackground);
      border-color: var(--vscode-inputValidation-errorBorder);
    }

    .msg-content {
      padding: 9px 12px;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 13px;
      line-height: 1.6;
    }
    .msg.error .msg-content { color: var(--vscode-errorForeground); }

    /* ── THOUGHT TRACE ────────────────────────────────────────────────────────
       Positioned ABOVE the response text inside the assistant bubble.
       Collapsed by default; user clicks to expand.                          */

    .thought-strip {
      border-bottom: 1px solid var(--vscode-widget-border, rgba(128,128,128,0.14));
      background: var(--vscode-textCodeBlock-background, rgba(0,0,0,0.1));
    }

    .thought-hd {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 5px 10px;
      cursor: pointer;
      user-select: none;
      transition: background var(--transition);
    }
    .thought-hd:hover { background: var(--vscode-toolbar-hoverBackground); }

    .thought-hd-icon  { font-size: 11px; opacity: 0.5; flex-shrink: 0; }
    .thought-hd-label { font-size: 11px; font-weight: 600; opacity: 0.6; flex: 1; }
    .thought-chevron  {
      font-size: 9px; opacity: 0.35;
      transition: transform var(--transition);
      flex-shrink: 0;
    }
    .thought-strip.open .thought-chevron { transform: rotate(180deg); }

    .thought-body {
      display: none;
      flex-direction: column;
      border-top: 1px solid var(--vscode-widget-border, rgba(128,128,128,0.1));
    }
    .thought-strip.open .thought-body { display: flex; }

    .thought-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 6px 10px;
      border-bottom: 1px solid var(--vscode-widget-border, rgba(128,128,128,0.07));
    }
    .thought-item:last-child { border-bottom: none; }

    .thought-item-row {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
    }
    .t-icon  { font-size: 10px; opacity: 0.55; }
    .t-label { font-weight: 600; opacity: 0.75; }

    .thought-detail {
      font-family: var(--vscode-editor-font-family, 'Consolas', monospace);
      font-size: 10px;
      opacity: 0.6;
      white-space: pre-wrap;
      background: var(--vscode-editor-background);
      padding: 4px 8px;
      border-radius: var(--radius-sm);
      border-left: 2px solid var(--vscode-badge-background);
      max-height: 100px;
      overflow-y: auto;
    }

    /* ── CURSOR ──────────────────────────────────────────────────────────────*/

    .cursor {
      display: inline-block;
      width: 2px; height: 13px;
      background: var(--vscode-foreground);
      margin-left: 1px;
      vertical-align: text-bottom;
      animation: blink 750ms step-end infinite;
      opacity: 0.6;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* ── TYPING INDICATOR ────────────────────────────────────────────────────*/

    #typing-row {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 2px 14px 4px;
    }
    .typing-dots { display: flex; gap: 3px; align-items: center; }
    .typing-dots span {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--vscode-badge-background);
      opacity: 0.55;
      animation: tdot 1.1s ease-in-out infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: .18s; }
    .typing-dots span:nth-child(3) { animation-delay: .36s; }
    @keyframes tdot { 0%,60%,100% { transform: none; } 30% { transform: translateY(-4px); } }
    .typing-label { font-size: 11px; opacity: 0.4; font-style: italic; }

    /* ── INPUT ───────────────────────────────────────────────────────────────*/

    #input-area {
      padding: 8px 10px 7px;
      border-top: 1px solid var(--vscode-widget-border, rgba(128,128,128,0.2));
      background: var(--vscode-sideBar-background, var(--vscode-editor-background));
      flex-shrink: 0;
    }

    #input-box {
      display: flex;
      align-items: flex-end;
      gap: 5px;
      background: var(--vscode-input-background);
      border: 1px solid var(--vscode-input-border, rgba(128,128,128,0.35));
      border-radius: var(--radius-md);
      padding: 5px 5px 5px 10px;
      transition: border-color var(--transition);
    }
    #input-box:focus-within { border-color: var(--vscode-focusBorder); }

    #user-input {
      flex: 1;
      min-height: 22px; max-height: 120px;
      resize: none;
      background: transparent;
      color: var(--vscode-input-foreground);
      border: none;
      padding: 0;
      font-family: inherit;
      font-size: 13px;
      overflow-y: auto;
      line-height: 1.5;
    }
    #user-input:focus { outline: none; }
    #user-input::placeholder { color: var(--vscode-input-placeholderForeground); opacity: 0.55; }

    #send-btn {
      background: var(--vscode-button-background);
      color: var(--vscode-button-foreground);
      border: none;
      border-radius: var(--radius-sm);
      width: 26px; height: 26px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background var(--transition), opacity var(--transition);
    }
    #send-btn:hover   { background: var(--vscode-button-hoverBackground); }
    #send-btn:disabled { opacity: 0.38; cursor: not-allowed; }

    #input-hint {
      font-size: 10px;
      opacity: 0.28;
      margin-top: 4px;
      padding: 0 2px;
    }

    /* ── SCROLLBAR ───────────────────────────────────────────────────────────*/

    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--vscode-scrollbarSlider-background); border-radius: 2px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--vscode-scrollbarSlider-hoverBackground); }

    /* ── TOKEN STATS ──────────────────────────────────────────────────────── */

    #token-stats {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      padding: 2px 10px;
      background: var(--vscode-sideBarSectionHeader-background, var(--vscode-editor-background));
      border-bottom: 1px solid var(--vscode-widget-border, rgba(128,128,128,0.2));
      flex-shrink: 0;
      font-size: 10px;
      font-family: var(--vscode-editor-font-family, monospace);
      color: var(--vscode-descriptionForeground);
      opacity: 0;
      transition: opacity 250ms ease;
      pointer-events: none;
      height: 0;
      overflow: hidden;
    }
    #token-stats.visible {
      opacity: 1;
      pointer-events: auto;
      height: auto;
      padding: 3px 10px;
    }
    .tok-seg { white-space: nowrap; letter-spacing: 0.2px; }
    .tok-seg b { font-weight: 600; color: var(--vscode-foreground); }
    .tok-label { opacity: 0.55; }
    .tok-sep { opacity: 0.25; font-size: 9px; }
  </style>
</head>
<body>

<!-- ── TOOLBAR ─────────────────────────────────────────────────────────────── -->
<div id="toolbar">
  <span id="brand">Bormagi</span>

  <div id="agent-selector-wrap">
    <select id="agent-selector" onchange="onDropdownChange()">
      <option value="">— Select agent —</option>
    </select>
  </div>

  <span id="provider-pill"></span>

  <button class="tb-btn" onclick="refreshAgents()" title="Refresh agents">
    <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
      <path d="M13.5 8a5.5 5.5 0 1 1-1.1-3.3l-1.2.9A4 4 0 1 0 12 8h-2l2.5-2.5L15 8h-1.5z"/>
    </svg>
  </button>

  <button class="tb-btn" onclick="clearChat()" title="Clear conversation">
    <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
      <path d="M10.12 1H5.88L5 2H2v1h12V2h-3l-.88-1zM4 5v9a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V5H4zm2 2h1v6H6V7zm3 0h1v6H9V7z"/>
    </svg>
  </button>
</div>

<!-- ── TOKEN STATS ──────────────────────────────────────────────────────────── -->
<div id="token-stats">
  <span class="tok-seg"><span class="tok-label">ctx </span><b id="tok-ctx-val">—</b></span>
  <span class="tok-sep">|</span>
  <span class="tok-seg"><span class="tok-label">in </span><b id="tok-in-val">—</b></span>
  <span class="tok-sep">|</span>
  <span class="tok-seg"><span class="tok-label">out </span><b id="tok-out-val">—</b></span>
</div>

<!-- ── MESSAGES ────────────────────────────────────────────────────────────── -->
<div id="messages">
  <div id="empty-state">
    <div class="empty-icon">◈</div>
    <div class="empty-title">No conversation yet</div>
    <div class="empty-sub">Select an agent above, then type a message.</div>
  </div>
</div>

<!-- ── TYPING ──────────────────────────────────────────────────────────────── -->
<div id="typing-row">
  <div class="typing-dots"><span></span><span></span><span></span></div>
  <span class="typing-label" id="typing-label">Agent is thinking…</span>
</div>

<!-- ── INPUT ───────────────────────────────────────────────────────────────── -->
<div id="input-area">
  <div id="input-box">
    <textarea id="user-input" rows="1"
      placeholder="Message… @agent-name to switch · /undo to revert"></textarea>
    <button id="send-btn" onclick="sendMessage()" title="Send (Enter)">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor">
        <path d="M1.5 1.5l13 6.5-13 6.5V9.75l9.5-1.75-9.5-1.75V1.5z"/>
      </svg>
    </button>
  </div>
  <div id="input-hint">Enter — send &nbsp;·&nbsp; Shift+Enter — new line</div>
</div>

<script>
  const vscode = acquireVsCodeApi();

  const messagesEl  = document.getElementById('messages');
  const inputEl     = document.getElementById('user-input');
  const sendBtn     = document.getElementById('send-btn');
  const typingRow   = document.getElementById('typing-row');
  const typingLabel = document.getElementById('typing-label');
  const agentSel    = document.getElementById('agent-selector');
  const pillEl      = document.getElementById('provider-pill');

  let currentContentEl    = null;   // .msg-content being streamed
  let currentThoughtStrip = null;   // .thought-strip of current row
  let currentCursor       = null;   // blinking cursor node
  let isStreaming         = false;
  let activeAgentId       = null;
  let agentList           = [];

  // ── Input auto-resize ──────────────────────────────────────────────────────

  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    setTimeout(resize, 0);
  });
  inputEl.addEventListener('input', resize);
  function resize() {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  }

  // ── Send ───────────────────────────────────────────────────────────────────

  function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || isStreaming) return;
    hideEmpty();
    appendUserMsg(text);
    inputEl.value = '';
    inputEl.style.height = 'auto';
    beginStream();
    vscode.postMessage({ type: 'user_message', text });
  }

  // ── Agent dropdown ─────────────────────────────────────────────────────────

  function onDropdownChange() {
    const id = agentSel.value;
    if (!id) return;
    vscode.postMessage({ type: 'select_agent', agentId: id });
  }

  function populateDropdown(list, activeId) {
    agentList = list;
    agentSel.innerHTML = '<option value="">— Select agent —</option>';
    list.forEach(a => {
      const opt = document.createElement('option');
      opt.value = a.id;
      // Show: "Advanced Coder  ·  anthropic / claude-sonnet-4-6"
      opt.textContent = a.name + '  ·  ' + a.providerType + ' / ' + a.model;
      agentSel.appendChild(opt);
    });
    if (activeId) {
      agentSel.value = activeId;
      setProviderPill(activeId);
    }
  }

  function setProviderPill(agentId) {
    const a = agentList.find(x => x.id === agentId);
    if (a) {
      pillEl.textContent = a.providerType;
      pillEl.classList.add('visible');
    } else {
      pillEl.classList.remove('visible');
    }
  }

  // ── Helpers ────────────────────────────────────────────────────────────────

  function hideEmpty() {
    const e = document.getElementById('empty-state');
    if (e) e.remove();
  }

  function ts() {
    const d = new Date();
    return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
  }

  function esc(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Append user message ────────────────────────────────────────────────────

  function appendUserMsg(text) {
    const row = document.createElement('div');
    row.className = 'msg user';
    row.innerHTML =
      '<div class="msg-header">' +
        '<div class="msg-avatar">U</div>' +
        '<span class="msg-sender">You</span>' +
        '<span class="msg-time">' + ts() + '</span>' +
      '</div>' +
      '<div class="msg-bubble"><div class="msg-content">' + esc(text) + '</div></div>';
    messagesEl.appendChild(row);
    scrollEnd();
  }

  // ── Start assistant row ────────────────────────────────────────────────────

  function beginStream() {
    isStreaming = true;
    sendBtn.disabled = true;
    typingRow.style.display = 'flex';
    typingLabel.textContent = (activeAgentId || 'Agent') + ' is thinking…';

    const label    = activeAgentId || 'Agent';
    const initials = label.slice(0, 2).toUpperCase();

    const row = document.createElement('div');
    row.className = 'msg assistant';
    row.id = 'stream-row';

    // ── Thought strip (ABOVE the text) ──
    const strip = document.createElement('div');
    strip.className = 'thought-strip';
    strip.innerHTML =
      '<div class="thought-hd" onclick="toggleStrip(this)">' +
        '<span class="thought-hd-icon">⚙</span>' +
        '<span class="thought-hd-label">0 tool actions</span>' +
        '<span class="thought-chevron">▼</span>' +
      '</div>' +
      '<div class="thought-body"></div>';

    // ── Text bubble ──
    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    const content = document.createElement('div');
    content.className = 'msg-content';
    content.id = 'stream-content';
    bubble.appendChild(content);

    row.innerHTML =
      '<div class="msg-header">' +
        '<div class="msg-avatar">' + esc(initials) + '</div>' +
        '<span class="msg-sender">' + esc(label) + '</span>' +
        '<span class="msg-time">' + ts() + '</span>' +
      '</div>';
    row.appendChild(strip);
    row.appendChild(bubble);
    messagesEl.appendChild(row);

    currentContentEl    = content;
    currentThoughtStrip = strip;

    // blinking cursor
    currentCursor = document.createElement('span');
    currentCursor.className = 'cursor';
    content.appendChild(currentCursor);

    scrollEnd();
  }

  window.toggleStrip = function(hd) {
    hd.closest('.thought-strip').classList.toggle('open');
  };

  // ── Stream text delta ──────────────────────────────────────────────────────

  function appendDelta(delta) {
    if (!currentContentEl || !currentCursor) return;
    currentCursor.insertAdjacentText('beforebegin', delta);
    scrollEnd();
  }

  // ── Append thought event ───────────────────────────────────────────────────

  function appendThought(event) {
    if (!currentThoughtStrip) return;

    const body    = currentThoughtStrip.querySelector('.thought-body');
    const counter = currentThoughtStrip.querySelector('.thought-hd-label');

    const icon = event.type === 'tool_call'   ? '→' :
                 event.type === 'tool_result'  ? '←' :
                 event.type === 'thinking'     ? '◎' : '⚠';

    const item = document.createElement('div');
    item.className = 'thought-item';
    item.innerHTML =
      '<div class="thought-item-row">' +
        '<span class="t-icon">' + icon + '</span>' +
        '<span class="t-label">' + esc(event.label) + '</span>' +
      '</div>' +
      (event.detail
        ? '<div class="thought-detail">' + esc(String(event.detail).slice(0, 600)) + '</div>'
        : '');

    body.appendChild(item);

    const n = body.querySelectorAll('.thought-item').length;
    counter.textContent = n + ' tool action' + (n === 1 ? '' : 's');
    scrollEnd();
  }

  // ── End stream ─────────────────────────────────────────────────────────────

  function endStream() {
    isStreaming = false;
    sendBtn.disabled = false;
    typingRow.style.display = 'none';

    const row = document.getElementById('stream-row');
    if (row) row.removeAttribute('id');
    const sc = document.getElementById('stream-content');
    if (sc) sc.removeAttribute('id');
    if (currentCursor) { currentCursor.remove(); currentCursor = null; }

    // Hide strip if no tool calls were made
    if (currentThoughtStrip) {
      const n = currentThoughtStrip.querySelectorAll('.thought-item').length;
      if (n === 0) currentThoughtStrip.style.display = 'none';
    }

    currentContentEl    = null;
    currentThoughtStrip = null;
  }

  // ── System / error messages ────────────────────────────────────────────────

  function appendSystemMsg(text, isError) {
    hideEmpty();
    const cls = isError ? 'error' : 'system';
    const row = document.createElement('div');
    row.className = 'msg ' + cls;
    row.innerHTML =
      '<div class="msg-header">' +
        '<div class="msg-avatar">' + (isError ? '!' : 'B') + '</div>' +
        '<span class="msg-sender">' + (isError ? 'Error' : 'Bormagi') + '</span>' +
        '<span class="msg-time">' + ts() + '</span>' +
      '</div>' +
      '<div class="msg-bubble"><div class="msg-content">' + esc(text) + '</div></div>';
    messagesEl.appendChild(row);
    scrollEnd();
  }

  // ── Misc ───────────────────────────────────────────────────────────────────

  function clearChat() {
    messagesEl.innerHTML =
      '<div id="empty-state">' +
        '<div class="empty-icon">◈</div>' +
        '<div class="empty-title">No conversation yet</div>' +
        '<div class="empty-sub">Select an agent above, then type a message.</div>' +
      '</div>';
    currentContentEl = currentThoughtStrip = currentCursor = null;
  }

  function refreshAgents() { vscode.postMessage({ type: 'refresh_agents' }); }
  function scrollEnd()     { messagesEl.scrollTop = messagesEl.scrollHeight; }

  // ── Extension → WebView messages ──────────────────────────────────────────

  window.addEventListener('message', e => {
    const m = e.data;
    switch (m.type) {

      case 'text_delta':
        appendDelta(m.delta);
        break;

      case 'text_done':
        endStream();
        break;

      case 'thought':
        appendThought(m.event);
        break;

      case 'error':
        endStream();
        appendSystemMsg(m.message, true);
        break;

      case 'agent_changed':
        activeAgentId = m.agentId;
        agentSel.value = m.agentId;
        setProviderPill(m.agentId);
        typingLabel.textContent = m.agentId + ' is thinking…';
        break;

      case 'agent_list':
        populateDropdown(m.agents, m.activeAgentId);
        if (m.activeAgentId) activeAgentId = m.activeAgentId;
        break;

      case 'undo_result':
        endStream();
        appendSystemMsg(m.message, false);
        break;

      case 'token_usage':
        updateTokenStats(m.lastInputTokens, m.sessionInputTokens, m.sessionOutputTokens);
        break;
    }
  });

  function updateTokenStats(lastIn, sessIn, sessOut) {
    const fmt = n => n.toLocaleString();
    document.getElementById('tok-ctx-val').textContent = fmt(lastIn);
    document.getElementById('tok-in-val').textContent  = fmt(sessIn);
    document.getElementById('tok-out-val').textContent = fmt(sessOut);
    document.getElementById('token-stats').classList.add('visible');
  }

  // Boot
  vscode.postMessage({ type: 'refresh_agents' });
</script>
</body>
</html>
