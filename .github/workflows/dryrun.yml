name: Bormagi Dry Run Matrix
on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  dry-run:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci

      - name: Bootstrap PEC
        run: npx ts-node scripts/pec-init.ts

      - name: Run Dryrun Validation
        run: npm run bormagi-dryrun
